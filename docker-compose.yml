# ─────────────────────────────────────────────────
# Music Metadata Enrichment Pipeline
# ─────────────────────────────────────────────────

x-worker-common: &worker-common
  build: .
  restart: always
  env_file: .env
  networks:
    - telegram-bot-network
  volumes:
    - exports:/data/exports
  logging:
    driver: "json-file"
    options:
      max-size: "50m"
      max-file: "5"

services:

  # ── Seeder (runs once, exits) ─────────────────────
  seeder:
    <<: *worker-common
    environment:
      WORKER_TYPE: seeder
    # Run once and exit — restart: on-failure so it re-seeds only if crashed
    restart: on-failure

  # ── Playlist Worker ───────────────────────────────
  # Requires Spotify API. Set replicas: 0 if Spotify access is revoked.
  # Discovery continues via deezer-direct-worker + itunes-worker.
  playlist-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: playlist_worker
    depends_on:
      seeder:
        condition: service_started

  # ── Artist Expansion Worker ───────────────────────
  # Requires Spotify API. Set replicas: 0 if Spotify access is revoked.
  artist-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: artist_worker
      SPOTIFY_RATE_LIMIT_RPS: "1"

  # ── Genre Expansion Worker ────────────────────────
  # Requires Spotify API. Set replicas: 0 if Spotify access is revoked.
  genre-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: genre_worker
      SPOTIFY_RATE_LIMIT_RPS: "1"

  # ── Audio Features Worker ─────────────────────────
  # Spotify returns 403 for /audio-features on most developer apps (deprecated).
  # Worker detects this after the first batch and stops calling Spotify entirely —
  # becomes a pure status advancer (base_collected → audio_features_added)
  # with zero Spotify quota usage. MUST run to unblock lyrics/quality workers.
  # High replica count is safe: after first 403 there are no Spotify calls.
  audio-features-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: audio_features_worker
      BATCH_SIZE: "200"
    deploy:
      replicas: 8

  # ── Lyrics Worker ─────────────────────────────────
  # Scale up to absorb the wave from audio_features_worker backlog.
  # Genius rate limit is per-instance; multiple replicas are safe.
  lyrics-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: lyrics_worker
    deploy:
      replicas: 5

  # ── Quality Scoring Worker ────────────────────────
  # Pure MongoDB reads/writes — no external API. Scale freely.
  quality-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: quality_worker
    deploy:
      replicas: 6

  # ── Exporter (runs on-demand or periodically) ─────
  exporter:
    <<: *worker-common
    environment:
      WORKER_TYPE: exporter
    restart: "no"

  # ════════════════════════════════════════════════
  # v2: Regional & MusicBrainz Extension Workers
  # ════════════════════════════════════════════════

  # ── Regional Seed Worker ──────────────────────────
  # Requires Spotify API (market-specific search).
  # Set replicas: 0 if Spotify access is revoked.
  # Regional coverage still provided by deezer-direct-worker BFS.
  regional-seed-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: regional_seed_worker

  # ── Language Detection Worker ─────────────────────
  # Supplementary pass — runs on all tracks regardless of status.
  # Can run many instances safely (optimistic locking prevents conflicts).
  language-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: language_worker

  # ── Transliteration Worker ────────────────────────
  # Generates normalized_name and transliterated_name for non-Latin tracks.
  # CPU-light — can share resources with other workers.
  transliteration-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: transliteration_worker

  # ── MusicBrainz Enrichment Worker ────────────────
  # Strict 1 req/s rate limit enforced in code.
  # DO NOT run multiple replicas — MusicBrainz will ban the IP.
  # Priority queue: Central Asia > CIS > MENA > general catalog.
  musicbrainz-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: musicbrainz_worker
    # Single instance only — rate limit is per-IP
    deploy:
      replicas: 1

  # ════════════════════════════════════════════════
  # v3: External-Source Discovery Workers
  # ════════════════════════════════════════════════

  # ── Last.fm Discovery Worker ──────────────────
  # Self-seeding: populates lastfm_seed_queue on first run,
  # then paginates through tag.getTopTracks / chart.getTopTracks.
  # Candidates land in track_candidates for Spotify matching.
  lastfm-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: lastfm_worker

  # ── YouTube Music Discovery Worker ────────────
  # Self-seeding: discovers tracks from YTMusic search + charts.
  # Stores youtube_video_id alongside candidate for later download.
  ytmusic-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: ytmusic_worker

  # ── Discogs Discovery Worker ──────────────────
  # Self-seeding: searches Discogs by genre style.
  # Strict 1 req/s rate limit enforced in code.
  # DO NOT run multiple replicas — Discogs will throttle / ban.
  discogs-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: discogs_worker
    deploy:
      replicas: 1

  # ── Candidate Match Worker ────────────────────
  # Searches Spotify (primary) then Deezer (fallback) for each candidate.
  # Throttled to 1 rps Spotify: ~2% match rate, not worth burning quota.
  # When Spotify API is cut off: set SPOTIFY_ENABLED=false — worker
  # switches to Deezer-only search with no restart needed.
  candidate-match-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: candidate_match_worker
      SPOTIFY_RATE_LIMIT_RPS: "2"
      # SPOTIFY_ENABLED: "false"   # ← uncomment when Spotify cuts access
    deploy:
      replicas: 2

  # ════════════════════════════════════════════════
  # v4: Artist Graph Expansion
  # ════════════════════════════════════════════════

  # ── Artist Graph Worker ───────────────────────
  # Expands catalog by traversing the artist collaboration graph:
  #   seed artists → full discography (album+single+compilation+appears_on)
  #   → featured artists → related artists (up to depth=5).
  # Each artist/album processed exactly once via MongoDB caches.
  # Horizontally scalable — optimistic locking on artist_graph_queue.
  # Expected scale: 50k–100k artists, 10M–30M tracks at depth=5.
  # 3 replicas × 5 rps = 15 rps total. Cap per replica at 5 so they
  # don't pile onto one credential — tune down if 429s reappear.
  # When Spotify API is cut off: set replicas to 0 (fully Spotify-dependent).
  # Discovery continues via deezer-direct-worker BFS at that point.
  # Requires Spotify API. Set replicas: 0 if Spotify access is revoked.
  # Deezer BFS (deezer-direct-worker) provides equivalent discovery
  # without Spotify — same graph expansion, ~90M tracks reachable.
  artist-graph-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: artist_graph_worker
      SPOTIFY_RATE_LIMIT_RPS: "5"
      ARTIST_GRAPH_BATCH_SIZE: "5"
      ARTIST_GRAPH_MAX_APPEARS_ON: "20"
    deploy:
      replicas: 3

  # ── YouTube Enrichment Worker ─────────────────
  # Supplementary pass: searches YouTube Music for a video ID for
  # tracks that don't have one. Uses ytmusicapi (no credentials).
  # Sets youtube_searched=True after each attempt (found or not).
  # Horizontally scalable.
  youtube-enrichment-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: youtube_enrichment_worker

  # ════════════════════════════════════════════════
  # v5: Deezer Direct Discovery (Spotify-independent)
  # ════════════════════════════════════════════════

  # ── Deezer Direct Worker ──────────────────────
  # Inserts tracks directly from Deezer API into the pipeline.
  # NO Spotify API required — works even when Spotify is rate-limited.
  # Uses "deezer:{id}" placeholder spotify_id; ISRC dedup prevents
  # conflicts with real Spotify tracks. Horizontally scalable.
  # 3 replicas safe: Deezer allows 50 req/5s, each replica uses 8 rps.
  # ── Deezer Direct Worker ──────────────────────
  # Inserts tracks directly from Deezer API into the pipeline.
  # NO Spotify API required — works even when Spotify is rate-limited.
  # RATE LIMIT: Deezer allows 50 req/5s = 10 rps per IP.
  # With N replicas: set DEEZER_RATE_LIMIT_RPS = floor(10 / N).
  # 3 replicas × 3 rps = 9 rps < 10 rps IP limit — safe.
  # DO NOT increase DEEZER_RATE_LIMIT_RPS without reducing replicas.
  deezer-direct-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: deezer_direct_worker
      DEEZER_RATE_LIMIT_RPS: "3"
      DEEZER_TOP_TRACKS_LIMIT: "100"
      DEEZER_MAX_ALBUMS_PER_ARTIST: "50"
    deploy:
      replicas: 3

  # ════════════════════════════════════════════════
  # v6: iTunes / Apple Music Discovery (no Spotify, no auth)
  # ════════════════════════════════════════════════

  # ── iTunes Worker ─────────────────────────────
  # Phase 1 (bootstrap): pulls Apple Music RSS charts for 40+ countries
  #   → ~5K–15K unique chart tracks inserted immediately.
  # Phase 2 (continuous): searches iTunes for every artist name already
  #   in our DB (50K+ artists × 200 tracks ≈ 3M candidates per cycle,
  #   ~1.5 hours per cycle at 8 rps).
  # No authentication, no Spotify dependency.
  # 2 replicas safe: iTunes rate limit is per-IP (~8 rps each).
  itunes-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: itunes_worker
      ITUNES_RATE_LIMIT_RPS: "6"
      ITUNES_BATCH_SIZE: "20"
    deploy:
      replicas: 3

  # ════════════════════════════════════════════════
  # v7: Yandex Music CIS Discovery
  # ════════════════════════════════════════════════

  # ── Yandex Music Worker ───────────────────────
  # CIS-focused direct discovery: Russia, Kazakhstan, Belarus, Uzbekistan,
  # Armenia, Azerbaijan, Georgia, Ukraine, Moldova.
  # Phase 1: chart top tracks for each CIS country (inserted immediately).
  # Phase 2: BFS artist discography expansion via similar-artists graph.
  # Requires YANDEX_MUSIC_TOKEN from a free Yandex account.
  # Worker is idle (no-op) if token is not set — safe to keep running.
  # Rate: 2 rps (self-imposed, unofficial API).
  # 2 replicas safe: per-instance rate is very conservative.
  yandex-worker:
    <<: *worker-common
    environment:
      WORKER_TYPE: yandex_worker
      # YANDEX_MUSIC_TOKEN: set in .env — get from free Yandex account

networks:
  telegram-bot-network:
    external: true
    name: telegram-bot-network

volumes:
  exports:
    driver: local
