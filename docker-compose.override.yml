# ─────────────────────────────────────────────────────────────────────────────
# No-Spotify override
#
# Применяется поверх docker-compose.yml когда Spotify API недоступен.
# Отключает Spotify-зависимые воркеры, масштабирует Spotify-независимые.
#
# Применение:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# или (если файл называется docker-compose.override.yml, Docker Compose
# подхватывает его автоматически):
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spotify-зависимые воркеры → выключить ─────────────────────────────────

  seeder:
    deploy:
      replicas: 0

  playlist-worker:
    deploy:
      replicas: 0

  genre-worker:
    deploy:
      replicas: 0

  artist-worker:
    deploy:
      replicas: 0

  artist-graph-worker:
    deploy:
      replicas: 0

  regional-seed-worker:
    deploy:
      replicas: 0

  # ── Candidate match → Deezer-only режим ───────────────────────────────────
  # Deezer search заменяет Spotify search. Threshold 0.75 (вместо 0.8) чтобы
  # компенсировать менее точный Deezer fuzzy match vs. Spotify structured.
  candidate-match-worker:
    environment:
      WORKER_TYPE: candidate_match_worker
      SPOTIFY_ENABLED: "false"
      CANDIDATE_MATCH_CONFIDENCE: "0.75"
    deploy:
      replicas: 4

  # ── Deezer BFS → масштабировать до 5 реплик ───────────────────────────────
  # IP limit Deezer = 10 rps. 5 реплик × 2 rps = 10 rps (точно в лимите).
  deezer-direct-worker:
    environment:
      WORKER_TYPE: deezer_direct_worker
      DEEZER_RATE_LIMIT_RPS: "2"
      DEEZER_TOP_TRACKS_LIMIT: "100"
      DEEZER_MAX_ALBUMS_PER_ARTIST: "50"
    deploy:
      replicas: 5

  # ── iTunes → масштабировать до 5 реплик ───────────────────────────────────
  # iTunes rate limit per-instance, не per-IP. 5 реплик безопасно.
  itunes-worker:
    environment:
      WORKER_TYPE: itunes_worker
      ITUNES_RATE_LIMIT_RPS: "6"
      ITUNES_BATCH_SIZE: "20"
    deploy:
      replicas: 5

  # ── Last.fm → 2 реплики ───────────────────────────────────────────────────
  # 4 rps per-instance. 2 реплики = 8 rps — в рамках лимита Last.fm.
  lastfm-worker:
    deploy:
      replicas: 2

  # ── YouTube Music → 2 реплики ─────────────────────────────────────────────
  ytmusic-worker:
    deploy:
      replicas: 2

  # ── Audio features → статус-адвансер, оставить 8 ─────────────────────────
  # После первого 403 от Spotify не делает API calls, только MongoDB updates.
  audio-features-worker:
    deploy:
      replicas: 8

  # ── Quality scoring → оставить 6 ─────────────────────────────────────────
  quality-worker:
    deploy:
      replicas: 6

  # ── JioSaavn (v9) ─────────────────────────────────────────────────────────
  # 2 реплики × 3 rps = 6 rps — нет задокументированного IP-лимита.
  jiosaavn-worker:
    deploy:
      replicas: 2

  # ── NetEase (v9) ──────────────────────────────────────────────────────────
  # 1 реплика: pyncm использует глобальное состояние сессии.
  netease-worker:
    deploy:
      replicas: 1

  # ── SoundCloud (v9) ───────────────────────────────────────────────────────
  # 1 реплика: SoundCloud агрессивно троттлит при нескольких клиентах.
  soundcloud-worker:
    deploy:
      replicas: 1

  # ── Shazam chart discovery (v8 — новая интеграция) ────────────────────────
  # 77 стран × 200 треков = 15 400 треков за цикл (каждые 24 часа).
  # Треки с ISRC дедублируются сразу; placeholder spotify_id = "shazam:{key}".
  # 2 реплики × 1 rps = 2 страны/сек → полный цикл за ~40 секунд.
  shazam-worker:
    build: .
    restart: always
    env_file: .env
    networks:
      - telegram-bot-network
    volumes:
      - exports:/data/exports
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      WORKER_TYPE: shazam_worker
      SHAZAM_RATE_LIMIT_RPS: "1.5"
      SHAZAM_CYCLE_HOURS: "24"
    deploy:
      replicas: 2

networks:
  telegram-bot-network:
    external: true
    name: telegram-bot-network

volumes:
  exports:
    driver: local
