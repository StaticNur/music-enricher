# ─────────────────────────────────────────────────────────────────────────────
# No-Spotify override
#
# Применяется поверх docker-compose.yml когда Spotify API недоступен.
# Отключает Spotify-зависимые воркеры, масштабирует Spotify-независимые.
#
# Применение:
#   docker compose -f docker-compose.yml -f docker-compose.override.yml up -d
#
# или (если файл называется docker-compose.override.yml, Docker Compose
# подхватывает его автоматически):
#   docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── Spotify-зависимые воркеры → выключить ─────────────────────────────────

  seeder:
    deploy:
      replicas: 0

  playlist-worker:
    deploy:
      replicas: 0

  genre-worker:
    deploy:
      replicas: 0

  artist-worker:
    deploy:
      replicas: 0

  # artist-graph-worker работает без Spotify через Deezer BFS — оставить 1 реплику.
  # Всё ещё находит новые треки через album_processed_cache BFS.
  artist-graph-worker:
    deploy:
      replicas: 1

  regional-seed-worker:
    deploy:
      replicas: 0

  # ── Candidate match → multi-source режим ──────────────────────────────────
  # Источники по приоритету: Deezer → JioSaavn → iTunes.
  # Threshold 0.75: компенсирует менее точный поиск без Spotify structured query.
  # Транслитерация в _best_match решает проблему кириллица/латиница.
  # 6 реплик: bottleneck (570K+ backlog кандидатов).
  #
  # Deezer IP-бюджет (10 rps суммарно на IP):
  #   candidate-match-worker: 6 × 0.5 = 3 rps
  #   deezer-direct-worker:   3 × 2   = 6 rps
  #   ИТОГО: 9 rps ✅
  candidate-match-worker:
    environment:
      WORKER_TYPE: candidate_match_worker
      SPOTIFY_ENABLED: "false"
      CANDIDATE_MATCH_CONFIDENCE: "0.75"
      DEEZER_RATE_LIMIT_RPS: "0.5"
      JIOSAAVN_RATE_LIMIT_RPS: "0.5"
    deploy:
      replicas: 6

  # ── Deezer BFS → 3 реплики × 2 rps = 6 rps ───────────────────────────────
  # IP limit Deezer = 10 rps суммарно. candidate-match-worker берёт 3 rps →
  # здесь остаётся 6 rps (3 реплики × 2 rps).
  # BFS достиг насыщения (~20K артистов обработано), высокий % дублей.
  deezer-direct-worker:
    environment:
      WORKER_TYPE: deezer_direct_worker
      DEEZER_RATE_LIMIT_RPS: "2"
      DEEZER_TOP_TRACKS_LIMIT: "100"
      DEEZER_MAX_ALBUMS_PER_ARTIST: "50"
    deploy:
      replicas: 3

  # ── iTunes → 3 реплики ────────────────────────────────────────────────────
  # iTunes rate limit per-instance, не per-IP. 3 реплики × 6 rps = 18 rps суммарно.
  itunes-worker:
    environment:
      WORKER_TYPE: itunes_worker
      ITUNES_RATE_LIMIT_RPS: "6"
      ITUNES_BATCH_SIZE: "20"
    deploy:
      replicas: 3

  # ── Last.fm → 0 реплик ────────────────────────────────────────────────────
  # Очередь lastfm_seed_queue исчерпана (0 pending). Воркеры простаивают.
  lastfm-worker:
    deploy:
      replicas: 0

  # ── YouTube Music → 2 реплики ─────────────────────────────────────────────
  ytmusic-worker:
    deploy:
      replicas: 2

  # ── Audio features → статус-адвансер, оставить 8 ─────────────────────────
  # После первого 403 от Spotify не делает API calls, только MongoDB updates.
  audio-features-worker:
    deploy:
      replicas: 1

  # ── Quality scoring → оставить 6 ─────────────────────────────────────────
  quality-worker:
    deploy:
      replicas: 1

  # ── JioSaavn (v9) ─────────────────────────────────────────────────────────
  # 2 реплики × 3 rps = 6 rps — нет задокументированного IP-лимита.
  jiosaavn-worker:
    deploy:
      replicas: 2

  # ── NetEase (v9) ──────────────────────────────────────────────────────────
  # 1 реплика: pyncm использует глобальное состояние сессии.
  netease-worker:
    deploy:
      replicas: 1

  # ── SoundCloud (v9) ───────────────────────────────────────────────────────
  # 1 реплика: SoundCloud агрессивно троттлит при нескольких клиентах.
  soundcloud-worker:
    deploy:
      replicas: 1

  # ── Shazam chart discovery (v8 — новая интеграция) ────────────────────────
  # 77 стран × 200 треков = 15 400 треков за цикл (каждые 24 часа).
  # Треки с ISRC дедублируются сразу; placeholder spotify_id = "shazam:{key}".
  # 2 реплики × 1 rps = 2 страны/сек → полный цикл за ~40 секунд.
  shazam-worker:
    build: .
    restart: always
    env_file: .env
    networks:
      - telegram-bot-network
    volumes:
      - exports:/data/exports
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    environment:
      WORKER_TYPE: shazam_worker
      SHAZAM_RATE_LIMIT_RPS: "1.5"
      SHAZAM_CYCLE_HOURS: "24"
    deploy:
      replicas: 2

networks:
  telegram-bot-network:
    external: true
    name: telegram-bot-network

volumes:
  exports:
    driver: local
